<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Parade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 5px solid #555;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h2>Parade</h2>
    <p>Watch as the characters join the march at different times!</p>

    <script>
        function setup() {
            createCanvas(600, 400);
        }

        function draw() {
            // Background: Sky and Ground
            background(135, 206, 235); // Blue Sky
            noStroke();
            fill(34, 139, 34); // Green Grass
            rect(0, 300, 600, 100);

            // Sun in the corner
            fill(255, 255, 0);
            circle(50, 50, 60);

            // --- CHARACTER 1: (Red) ---
            // Starts at frame 0. Speed is 2 pixels per frame.
            let x1 = frameCount * 2;
            drawCharacter(x1, 280, "red", "The Leader");

            // --- CHARACTER 2: (Yellow) ---
            // Starts after a delay (200 frames).
            if (frameCount > 200) {
                let x2 = (frameCount - 200) * 2;
                drawCharacter(x2, 280, "yellow", "The Friend");
            }

            // --- CHARACTER 3 (Purple) ---
            // Starts very late (400 frames) but runs faster (* 4).
            if (frameCount > 400) {
                let x3 = (frameCount - 400) * 4;
                drawCharacter(x3, 280, "purple", "Wait for me!");
            }
        }

        // --- THE CHARACTER BUILDER ---
        // This function draws a complex character instead of just a square.
        function drawCharacter(x, y, shirtColor, nameTag) {
            // 1. Legs/Pants
            fill(50);
            rect(x + 5, y + 25, 5, 15); // Left leg
            rect(x + 15, y + 25, 5, 15); // Right leg

            // 2. Body (Shirt)
            fill(shirtColor);
            rect(x, y, 25, 30, 5); // Rect with slightly rounded corners

            // 3. Head
            fill(255, 224, 189); // Skin tone
            circle(x + 12, y - 10, 22);

            // 4. Eyes
            fill(0);
            circle(x + 8, y - 12, 3);
            circle(x + 17, y - 12, 3);

            // 5. Nametag/Label
            fill(0);
            textSize(12);
            textAlign(CENTER);
            text(nameTag, x + 12, y - 30);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Parade Story</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 5px solid #555;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h2>A Small Story: The Parade</h2>
    <p>Watch as the characters join the march at different times!</p>

    <script>
        // --- SETTING THE STAGE ---
        function setup() {
            createCanvas(600, 400);
        }

        function draw() {
            // Background: Sky and Ground
            background(135, 206, 235); // Blue Sky
            noStroke();
            fill(34, 139, 34); // Green Grass
            rect(0, 300, 600, 100);

            // Sun in the corner
            fill(255, 255, 0);
            circle(50, 50, 60);
		// --- CHARACTER 1: The Leader (Red) ---
            // Starts at frame 0. Speed is 2 pixels per frame.
            let x1 = frameCount * 2;
            drawCharacter(x1, 280, "red", "The Leader");

            // --- CHARACTER 2: The Friend (Yellow) ---
            // Starts after a delay (200 frames).
            if (frameCount > 200) {
                let x2 = (frameCount - 200) * 2;
                drawCharacter(x2, 280, "yellow", "The Friend");
            }

            // --- CHARACTER 3: The Late Runner (Purple) ---
            // Starts very late (400 frames) but runs faster (* 4).
            if (frameCount > 400) {
                let x3 = (frameCount - 400) * 4;
                drawCharacter(x3, 280, "purple", "Wait for me!");
            }
        }
